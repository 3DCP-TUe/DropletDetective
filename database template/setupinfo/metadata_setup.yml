hardware:
  load_cell: 
    name: HBM U3
    maxload [kN]: 1
  signal_conditioner:
    name: HBM ClipX BM40IE
  camera: 
    manufacturer: Basler
    model: a2A1920-51gcPRO
    interface: GigE
    sensor:
      vendor: Sony
      sensor: IMX392
      shutter: global shutter
      format: 1/2.3"
      diagonal: 7.77 mm
      type: CMOS
      size:
        width: 6.6 mm
        height: 4.1 mm
      resolution:
        width: 1920
        height: 1200
        frame_rate: 51
  lens:
    name: Basler C125-0818-5M
    focal_length: 8 mm
    aperture_range: 1.8 - 22
    aperture_set: F1.8
  geometry: 
    distance_camera_to_axis_nozzle: 850 mm
